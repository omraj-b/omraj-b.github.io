---
layout: default
title: Blog
---

<div class="container">
  <h1>Blog</h1>

  <div class="grid">
    {% for post in site.posts %}
      <div class="card post-card">
        <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
        <p class="date">{{ post.date | date: "%B %d, %Y" }}</p>
        <p>{{ post.excerpt }}</p>
      </div>
    {% endfor %}
  </div>
</div>
